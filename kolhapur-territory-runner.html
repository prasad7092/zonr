<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQOfcnkcxV9dLxt8uFddkov2aNNVMVbUs",
  authDomain: "zonr-3b38a.firebaseapp.com",
  projectId: "zonr-3b38a",
  storageBucket: "zonr-3b38a.firebasestorage.app",
  messagingSenderId: "179531351302",
  appId: "1:179531351302:web:f7840c8cdd50cb86efca87"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._auth = auth;
window._db = db;
window._fbReady = true;

window.fbSignup = async (name, email, pass) => {
  const cred = await createUserWithEmailAndPassword(auth, email, pass);
  await updateProfile(cred.user, { displayName: name });
  await setDoc(doc(db, "users", cred.user.uid), { name, email, km: 0, zones: 0, createdAt: Date.now() });
  return cred.user;
};

window.fbLogin = async (email, pass) => {
  const cred = await signInWithEmailAndPassword(auth, email, pass);
  return cred.user;
};

window.fbLogout = () => signOut(auth);

window.fbSaveRun = async (uid, km, zones) => {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const d = snap.data();
    await updateDoc(ref, { km: (d.km||0)+km, zones: Math.max(d.zones||0, zones) });
  }
};

onAuthStateChanged(auth, user => {
  window._currentUser = user;
  if (user) {
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('userNameDisplay').textContent = user.displayName || user.email;
    initApp();
  } else {
    document.getElementById('authModal').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>

<style>
:root {
  --bg: #0d0d12;
  --panel: #14141c;
  --panel2: #1a1a24;
  --border: #22222f;
  --accent: #ff4d00;
  --accent2: #00c8ff;
  --green: #00e87a;
  --text: #eeeef5;
  --muted: #5a5a78;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; overflow:hidden; }

/* ── AUTH MODAL ─────────────────────────────────────── */
#authModal {
  position:fixed; inset:0; background:rgba(10,10,15,0.97);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.auth-box {
  background:var(--panel); border:1px solid var(--border);
  border-radius:20px; padding:36px 32px; width:360px;
  box-shadow:0 0 60px rgba(255,77,0,0.1);
}
.auth-logo {
  font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:4px;
  color:var(--accent); text-shadow:0 0 30px rgba(255,77,0,0.5); text-align:center;
}
.auth-logo span { color:var(--text); }
.auth-sub { text-align:center; color:var(--muted); font-size:12px; letter-spacing:2px; margin-bottom:28px; }
.auth-tabs { display:flex; gap:0; margin-bottom:24px; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.auth-tab {
  flex:1; padding:10px; text-align:center; cursor:pointer;
  font-weight:600; font-size:13px; color:var(--muted); transition:all 0.2s;
}
.auth-tab.active { background:var(--accent); color:white; }
.auth-field { margin-bottom:14px; }
.auth-field label { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px; }
.auth-field input {
  width:100%; padding:12px 14px; background:var(--panel2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
  outline:none; transition:border 0.2s;
}
.auth-field input:focus { border-color:var(--accent); }
.auth-btn {
  width:100%; padding:14px; background:var(--accent); border:none; border-radius:10px;
  color:white; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px;
  cursor:pointer; margin-top:6px; transition:all 0.2s;
  box-shadow:0 0 24px rgba(255,77,0,0.35);
}
.auth-btn:hover { background:#ff6120; transform:translateY(-1px); }
.auth-err { color:#ff6060; font-size:12px; margin-top:8px; text-align:center; min-height:18px; }

/* ── APP ────────────────────────────────────────────── */
#app { display:none; flex-direction:column; height:100vh; }

/* header */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--border);
  z-index:1000; flex-shrink:0;
}
.logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--accent); }
.logo span { color:var(--text); }
.hright { display:flex; gap:12px; align-items:center; }
.stat { text-align:center; }
.stat-val { font-family:'Bebas Neue',sans-serif; font-size:17px; color:var(--accent); line-height:1; }
.stat-label { font-size:8px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
#timer { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--accent2); letter-spacing:2px; }
.user-chip {
  display:flex; align-items:center; gap:7px; background:var(--panel2);
  border:1px solid var(--border); border-radius:20px; padding:5px 12px 5px 5px;
  cursor:pointer; font-size:12px; font-weight:600;
}
.user-avatar {
  width:26px; height:26px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; font-size:14px; color:white;
}

/* tabs */
.tabs { display:flex; background:var(--panel); border-bottom:1px solid var(--border); flex-shrink:0; z-index:999; }
.tab {
  flex:1; padding:10px 4px; text-align:center; font-family:'Bebas Neue',sans-serif;
  font-size:13px; letter-spacing:1.5px; color:var(--muted); cursor:pointer;
  border-bottom:2px solid transparent; transition:all 0.2s;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* pages */
.page { display:none; flex:1; overflow:hidden; flex-direction:column; }
.page.active { display:flex; }

/* MAP */
#map { flex:1; width:100%; z-index:1; }
.map-overlay {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:900; display:flex; gap:10px; align-items:center;
}
.btn-run {
  padding:13px 32px; border-radius:50px; border:none;
  font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:3px;
  cursor:pointer; background:var(--accent); color:white;
  box-shadow:0 0 28px rgba(255,77,0,0.5); transition:all 0.2s;
}
.btn-run.running { background:#cc3300; animation:pulse 1.5s infinite; }
.btn-ghost {
  padding:11px 16px; border-radius:50px; border:1px solid var(--border);
  background:rgba(20,20,28,0.92); color:var(--muted); font-size:12px;
  font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.btn-ghost:hover { border-color:var(--accent2); color:var(--accent2); }
@keyframes pulse {
  0%,100% { box-shadow:0 0 20px rgba(255,77,0,0.4); }
  50% { box-shadow:0 0 40px rgba(255,77,0,0.9); }
}

/* TRACKS PAGE */
.scroll-page { padding:14px; overflow-y:auto; flex:1; }
.section-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--muted); margin-bottom:10px; }
.track-grid { display:flex; flex-direction:column; gap:10px; }
.track-card {
  background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; cursor:pointer; transition:all 0.22s; display:flex; align-items:center; gap:14px;
}
.track-card:hover { border-color:var(--accent); transform:translateX(3px); }
.track-card.selected { border-color:var(--accent); background:rgba(255,77,0,0.08); }
.track-dist {
  font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent);

}
.track-dist span { font-size:13px; color:var(--muted); }
.track-info { flex:1; }
.track-name { font-size:14px; font-weight:700; margin-bottom:3px; }
.track-desc { font-size:11px; color:var(--muted); }
.track-tags { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.tag {
  padding:2px 8px; border-radius:20px; font-size:10px; font-weight:600;
  background:var(--panel); border:1px solid var(--border); color:var(--muted);

.tag.easy { border-color:#00e87a44; color:var(--green); }
.tag.medium { border-color:#ffaa0044; color:#ffaa00; }
.tag.hard { border-color:#ff4d0044; color:var(--accent); }
.btn-start-track {
  width:100%; padding:13px; border-radius:10px; border:none;
  background:var(--accent); color:white; font-family:'Bebas Neue',sans-serif;
  font-size:17px; letter-spacing:2px; cursor:pointer; margin-top:14px;
  box-shadow:0 0 20px rgba(255,77,0,0.3); transition:all 0.2s;
}
.btn-start-track:hover { background:#ff6120; }

/* LEADERBOARD */
.player-card {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:10px; background:rgba(255,255,255,0.02); border:1px solid var(--border); margin-bottom:8px;
}
.player-card.you { border-color:rgba(255,77,0,0.4); background:rgba(255,77,0,0.06); }
.rank { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--muted); width:28px; text-align:center; }
.rank.gold{color:#ffd700;} .rank.silver{color:#c0c0c0;} .rank.bronze{color:#cd7f32;}
.pdot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.pname { font-size:14px; font-weight:700; }
.pzones { font-size:11px; color:var(--muted); margin-top:2px; }
.pkm { font-family:'Bebas Neue',sans-serif; font-size:22px; }
.pkm span { font-size:11px; color:var(--muted); }

/* ZONES */
.zone-card {
  padding:12px 14px; border-radius:10px; border:1px solid var(--border);
  background:rgba(255,255,255,0.02); cursor:pointer; transition:all 0.2s; margin-bottom:6px;
}
.zone-card:hover { border-color:rgba(255,77,0,0.4); transform:translateX(3px); }
.zone-name { font-size:13px; font-weight:700; margin-bottom:4px; }
.zone-owner { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
.zodot { width:8px; height:8px; border-radius:50%; }
.zone-bar-wrap { margin-top:8px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.zone-bar { height:100%; border-radius:2px; transition:width 0.4s; }
.zone-km-row { display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
.zone-km-item { font-size:10px; color:var(--muted); display:flex; align-items:center; gap:4px; }

/* TOAST */
.toast {
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%) translateY(100px);
  background:var(--panel); border:1px solid var(--accent); color:var(--text);
  padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600;
  z-index:9990; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap; box-shadow:0 0 30px rgba(255,77,0,0.2);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* map custom */
.leaflet-container { background:#0d0d12; }
</style>
</head>

<script>
// ── AUTH UI ────────────────────────────────────────────────────────────────
function showAuthTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabSignup').classList.toggle('active', tab==='signup');
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
  document.getElementById('authErr').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  try {
    await window.fbLogin(email, pass);
  } catch(e) {
    document.getElementById('authErr').textContent = e.message.replace('Firebase:','').replace(/\(.*\)/,'').trim();
  }
}

async function doSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;
  if (!name) { document.getElementById('authErr').textContent = 'Please enter your name'; return; }
  try {
    await window.fbSignup(name, email, pass);
  } catch(e) {
    document.getElementById('authErr').textContent = e.message.replace('Firebase:','').replace(/\(.*\)/,'').trim();

}

// ── PRESET TRACKS (hand-mapped along real Kolhapur roads) ──────────────────

let selectedTrack = TRACKS[0];

// ── MAP INIT ───────────────────────────────────────────────────────────────
let mapInitialized = false;
let map, youMarker, yourLine, trackLine;
const yourPath = [];
const zonePolygons = {};

function initApp() {
  const user = window._currentUser;
  if (user) {
    const initial = (user.displayName || user.email || 'U')[0].toUpperCase();
    document.getElementById('userAvatar').textContent = initial;
    PLAYERS.you.name = user.displayName || 'You';
  }
  if (!mapInitialized) {
    mapInitialized = true;
    setTimeout(initMap, 100);
  }
  renderTracks();
  updateUI();
  showToast('👋 Welcome back, ' + (user?.displayName || 'Runner') + '!');
}

function initMap() {
  map = L.map('map', { zoomControl:false }).setView([16.7050, 74.2433], 14);

  // Clean minimal dark tiles using CartoDB
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_no_labels/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO',
    subdomains:'abcd', maxZoom:19
  }).addTo(map);

  // Road labels layer on top
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains:'abcd', maxZoom:19, opacity:0.7
  }).addTo(map);

  L.control.zoom({ position:'topleft' }).addTo(map);

  // You marker
  const youIcon = L.divIcon({
    html:`<div style="width:16px;height:16px;border-radius:50%;background:#ff4d00;border:3px solid white;box-shadow:0 0 14px rgba(255,77,0,1)"></div>`,
    className:'', iconAnchor:[8,8]
  });
  youMarker = L.marker([16.7050,74.2433], { icon:youIcon }).addTo(map);
  yourLine = L.polyline([], { color:'#ff4d00', weight:4, opacity:0.9 }).addTo(map);
  trackLine = L.polyline([], { color:'#00c8ff', weight:3, opacity:0.6, dashArray:'8,6' }).addTo(map);

  // Friend markers
  const friendPos = { rahul:[16.7010,74.2280], sneha:[16.6990,74.2520], amit:[16.7070,74.2440] };
  Object.entries(friendPos).forEach(([pid,pos]) => {
    const p = PLAYERS[pid];
    L.marker(pos, { icon: L.divIcon({
      html:`<div style="width:12px;height:12px;border-radius:50%;background:${p.color};border:2px solid white;box-shadow:0 0 8px ${p.color}aa"></div>`,
      className:'', iconAnchor:[6,6]
    })}).addTo(map).bindTooltip(p.name);
  });

  drawZones();
}

// ── DRAW ZONES ─────────────────────────────────────────────────────────────
function getOwner(zone) {
  let best=null, bestKm=0;
  for (const [pid,km] of Object.entries(zone.km)) { if(km>bestKm){bestKm=km;best=pid;} }
  return best && bestKm>0 ? best : null;
}

function drawZones() {
  if (!map) return;
  ZONES_DEF.forEach(z => {
    if (zonePolygons[z.id]) map.removeLayer(zonePolygons[z.id]);
    const owner = getOwner(z);
    const color = owner ? PLAYERS[owner].color : '#333350';
    const total = Object.values(z.km).reduce((a,b)=>a+b,0);
    const opacity = owner ? 0.3+Math.min(total/10,0.35) : 0.12;
    const poly = L.polygon(z.coords, { color, fillColor:color, weight:2, fillOpacity:opacity, opacity:0.85 }).addTo(map);
    poly.bindTooltip(`<b>${z.name}</b><br>${owner?PLAYERS[owner].name:'Unclaimed'}`,{sticky:true});
    zonePolygons[z.id] = poly;
  });
}

// ── TRACKS ─────────────────────────────────────────────────────────────────
function renderTracks() {
  const diffColor = { easy:'easy', medium:'medium', hard:'hard' };
  document.getElementById('trackGrid').innerHTML = TRACKS.map(t => `
    <div class="track-card ${t.id===selectedTrack.id?'selected':''}" onclick="selectTrack('${t.id}')">
      <div class="track-dist">${t.dist}<br><span>km</span></div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-desc">${t.desc}</div>
        <div class="track-tags">
          <span class="tag ${diffColor[t.difficulty]}">${t.difficulty.toUpperCase()}</span>
          ${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}
        </div>
      </div>
    </div>`).join('');
}

function selectTrack(id) {
  selectedTrack = TRACKS.find(t=>t.id===id);
  renderTracks();
}

function startSelectedTrack() {
  switchTab('map');
  setTimeout(() => {
    if (!map) return;
    // draw track on map
    trackLine.setLatLngs(selectedTrack.waypoints);
    map.fitBounds(L.polyline(selectedTrack.waypoints).getBounds(), { padding:[40,40] });
    // move you to track start
    youMarker.setLatLng(selectedTrack.start);
    showToast(`🏃 ${selectedTrack.name} loaded! Hit START RUN`);
    // add start marker
    L.marker(selectedTrack.start, { icon: L.divIcon({
      html:`<div style="background:#00c8ff;color:#000;font-family:'Bebas Neue',sans-serif;font-size:11px;padding:3px 7px;border-radius:20px;white-space:nowrap;font-weight:700;">START</div>`,
      className:'', iconAnchor:[20,10]
    })}).addTo(map);
  }, 60);
}

// ── RUN ────────────────────────────────────────────────────────────────────
let running=false, watchId=null, seconds=0, timerInt=null, totalDist=0, demoInt=null, demoStep=0;

function toggleRun() {
  running = !running;
  const btn = document.getElementById('runBtn');
  if (running) {
    btn.textContent='STOP RUN'; btn.classList.add('running');
    seconds=0; yourPath.length=0; yourLine.setLatLngs([]);
    timerInt = setInterval(()=>{
      seconds++;
      document.getElementById('timer').textContent=
        String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0');
    },1000);
    if (navigator.geolocation) {
      watchId = navigator.geolocation.watchPosition(onGPS, onGPSErr, {enableHighAccuracy:true});
      showToast('📍 GPS locked — go!');
    } else { showToast('Demo mode'); startDemo(); }
  } else {
    btn.textContent='START RUN'; btn.classList.remove('running');
    clearInterval(timerInt); clearInterval(demoInt);
    if (watchId) navigator.geolocation.clearWatch(watchId);
    // save to firebase
    if (window._currentUser && totalDist > 0) {
      window.fbSaveRun(window._currentUser.uid, totalDist, PLAYERS.you.zones)
        .then(()=>showToast(`✅ ${totalDist.toFixed(2)} km saved to your profile!`))
        .catch(()=>showToast(`✅ Run done! ${totalDist.toFixed(2)} km`));
    } else {
      showToast(`✅ Run done! ${totalDist.toFixed(2)} km`);
    }
  }
}

function startDemo() {
  // simulate running along selected track waypoints
  const pts = selectedTrack.waypoints;
  demoStep = 0;
  demoInt = setInterval(()=>{
    if (!running) return;
    const idx = demoStep % pts.length;
    movePlayer(pts[idx]);
    demoStep++;
  },900);
}

function onGPS(pos) { movePlayer([pos.coords.latitude, pos.coords.longitude]); }
function onGPSErr() { showToast('GPS error — demo mode'); startDemo(); }

function movePlayer(pos) {
  if (yourPath.length>0) {
    const d = getDistKm(yourPath[yourPath.length-1], pos);
    totalDist+=d; PLAYERS.you.km+=d;
    document.getElementById('distVal').textContent=totalDist.toFixed(2);
    ZONES_DEF.forEach(z=>{ if(isInside(pos,z.coords)) z.km.you+=d; });
    updateUI();
  }
  yourPath.push(pos);
  if (yourLine) yourLine.setLatLngs(yourPath);
  if (youMarker) { youMarker.setLatLng(pos); map.panTo(pos,{animate:true,duration:0.5}); }
}

// ── SIMULATE FRIENDS ───────────────────────────────────────────────────────
function simulateFriends() {
  showToast('⚡ Friends running...');
  const friends=['rahul','sneha','amit']; let n=0;
  const iv=setInterval(()=>{
    const f=friends[Math.floor(Math.random()*3)];
    const z=ZONES_DEF[Math.floor(Math.random()*ZONES_DEF.length)];
    const prev=getOwner(z);
    z.km[f]+=Math.random()*0.4+0.1; PLAYERS[f].km+=0.2;
    if(getOwner(z)!==prev&&prev) setTimeout(()=>showToast(`🔥 ${PLAYERS[f].name} captured ${z.name}!`),200);
    drawZones(); updateUI();
    if(++n>=8) clearInterval(iv);
  },600);
}

// ── UPDATE UI ──────────────────────────────────────────────────────────────
function updateUI() {
  drawZones();
  Object.keys(PLAYERS).forEach(p=>PLAYERS[p].zones=0);
  ZONES_DEF.forEach(z=>{const o=getOwner(z);if(o)PLAYERS[o].zones++;});
  document.getElementById('zonesWon').textContent=PLAYERS.you.zones;

  const sorted=Object.entries(PLAYERS).sort((a,b)=>b[1].km-a[1].km);
  const ranks=['gold','silver','bronze',''];
  document.getElementById('lbList').innerHTML=sorted.map(([pid,p],i)=>`
    <div class="player-card ${pid==='you'?'you':''}">
      <div class="rank ${ranks[i]||''}">${i+1}</div>
      <div class="pdot" style="background:${p.color}"></div>
      <div style="flex:1"><div class="pname">${p.name}${pid==='you'?' 👤':''}</div><div class="pzones">${p.zones} zone${p.zones!==1?'s':''}</div></div>
      <div class="pkm">${p.km.toFixed(1)}<span>km</span></div>
    </div>`).join('');

  document.getElementById('zonesList').innerHTML=ZONES_DEF.map(z=>{
    const owner=getOwner(z);
    const oc=owner?PLAYERS[owner].color:'#333350';
    const total=Object.values(z.km).reduce((a,b)=>a+b,0);
    const youPct=total>0?z.km.you/total*100:0;
    const kmRow=Object.entries(z.km).map(([pid,km])=>
      `<div class="zone-km-item"><div style="width:6px;height:6px;border-radius:50%;background:${PLAYERS[pid].color}"></div>${PLAYERS[pid].name}: ${km.toFixed(1)}km</div>`
    ).join('');
    return `<div class="zone-card" onclick="flyTo('${z.id}')">
      <div class="zone-name">${z.name}</div>
      <div class="zone-owner"><div class="zodot" style="background:${oc}"></div>${owner?PLAYERS[owner].name:'Unclaimed'}</div>
      <div class="zone-km-row">${kmRow}</div>
      <div class="zone-bar-wrap"><div class="zone-bar" style="width:${youPct}%;background:#ff4d00"></div></div>
    </div>`;
  }).join('');
}

// ── TABS ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['map','tracks','leaderboard','zones'][i]===name);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='map'&&map) setTimeout(()=>map.invalidateSize(),50);
}

function flyTo(id) {
  const z=ZONES_DEF.find(z=>z.id===id); if(!z) return;
  switchTab('map');
  setTimeout(()=>map.fitBounds(L.polygon(z.coords).getBounds(),{padding:[40,40]}),60);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function getDistKm(a,b){
  const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function isInside(point,poly){
  const[lat,lng]=point;let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const[yi,xi]=poly[i],[yj,xj]=poly[j];
    if(((yi>lat)!==(yj>lat))&&(lng<(xj-xi)*(lat-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
let toastTO;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTO);toastTO=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
